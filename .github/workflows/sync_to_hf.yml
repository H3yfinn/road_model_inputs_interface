name: Sync to Hugging Face Space

on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Push snapshot to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://finbarmaunsell:$HF_TOKEN@huggingface.co/spaces/finbarmaunsell/leap_road_model
          # Push only current snapshot with no history — avoids HF rejecting old commits that had large files
          git checkout --orphan hf-deploy
          git commit -m "deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push hf hf-deploy:main --force
