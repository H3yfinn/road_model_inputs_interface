name: Sync to Hugging Face Space

on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: true

      - name: Push snapshot to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote add hf https://finbarmaunsell:$HF_TOKEN@huggingface.co/spaces/finbarmaunsell/leap_road_model

          # Re-stage LFS files as regular git blobs so HF receives real content, not LFS pointers
          git lfs ls-files -n | xargs -r git rm --cached
          git lfs ls-files -n | xargs -r git add

          # Push only current snapshot with no history — avoids HF rejecting old commits that had large files
          git checkout --orphan hf-deploy
          # Remove dirs not needed on HF (docs contains PNGs which HF rejects as binary files)
          git rm -rf --cached docs/ 2>/dev/null || true
          git commit -m "deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push hf hf-deploy:main --force
